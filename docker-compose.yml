services:
  postgres:
    image: postgres:16-alpine
    container_name: ddt-postgres
    environment:
      POSTGRES_USER: ddt_user
      POSTGRES_PASSWORD: ddt_password
      POSTGRES_DB: ddt_db
    ports:
      - "5432:5432"
    volumes:
      - ddt_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddt_user -d ddt_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  ddt_postgres_data:
    name: ddt_postgres_data
    driver: local
